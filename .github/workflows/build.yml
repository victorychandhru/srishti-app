name: Build SRISHTI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: ''

    - uses: android-actions/setup-android@v3

    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Extract project
      run: |
        unzip -o SRISHTI_GITHUB.zip -d /tmp/src/
        cp -rf /tmp/src/app ./app
        cp -f /tmp/src/build.gradle ./build.gradle
        cp -f /tmp/src/settings.gradle ./settings.gradle
        cp -rf /tmp/src/gradle ./gradle
        cp -f /tmp/src/gradlew ./gradlew
        chmod +x gradlew
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon --no-build-cache

    - uses: actions/upload-artifact@v4
      with:
        name: SRISHTI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
