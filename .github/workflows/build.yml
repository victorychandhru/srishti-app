name: Build SRISHTI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: ''
    - uses: android-actions/setup-android@v3
    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
    - name: Extract and build
      run: |
        unzip -o SRISHTI_FIXED.zip -d /tmp/src/
        cp -rf /tmp/src/. ./
        chmod +x gradlew
        printf 'android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\n' > gradle.properties
        wget -q "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar
        ./gradlew assembleDebug --no-daemon --no-build-cache
    - uses: actions/upload-artifact@v4
      with:
        name: SRISHTI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
