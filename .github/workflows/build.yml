name: Build SRISHTI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract ZIP
      run: |
        unzip -o SRISHTI_GITHUB.zip -d extracted/
        cp -rf extracted/* . 2>/dev/null || true
        for dir in extracted/*/; do
          cp -rf "$dir"* . 2>/dev/null || true
        done

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: android-actions/setup-android@v3

    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip -q gradle-8.4-bin.zip
        export PATH=$PWD/gradle-8.4/bin:$PATH
        echo "PATH=$PWD/gradle-8.4/bin:$PATH" >> $GITHUB_ENV

    - name: Accept licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK
      run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Build APK
      run: |
        chmod +x gradlew
        gradle assembleDebug --no-daemon

    - uses: actions/upload-artifact@v4
      with:
        name: SRISHTI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
