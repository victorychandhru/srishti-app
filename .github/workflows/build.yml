name: Build SRISHTI APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: ''

    - uses: android-actions/setup-android@v3

    - run: yes | sdkmanager --licenses || true
    - run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Extract and fix project
      run: |
        unzip -o SRISHTI_GITHUB.zip -d /tmp/src/
        cp -rf /tmp/src/app ./app
        cp -f /tmp/src/build.gradle ./build.gradle
        cp -f /tmp/src/settings.gradle ./settings.gradle
        cp -rf /tmp/src/gradle ./gradle
        cp -f /tmp/src/gradlew ./gradlew
        chmod +x gradlew
        printf 'android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m\norg.gradle.daemon=false\n' > gradle.properties
        cat > app/src/main/res/values/themes.xml << 'THEME'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.Srishti" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                <item name="android:windowBackground">#000308</item>
                <item name="android:statusBarColor">#00000000</item>
                <item name="android:navigationBarColor">#00000000</item>
                <item name="android:windowLightStatusBar">false</item>
            </style>
        </resources>
        THEME

    - name: Download gradle-wrapper.jar
      run: |
        wget -q "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -O gradle/wrapper/gradle-wrapper.jar

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon --no-build-cache

    - uses: actions/upload-artifact@v4
      with:
        name: SRISHTI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
